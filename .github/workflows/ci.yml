name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref — saves CI minutes on force-pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first — downstream packages resolve @berkantdev/agentui-core
      # through its `types` / `exports` fields which point into dist/.
      # Without a build, vue-tsc can't find the core type declarations.
      - name: Build
        run: pnpm -r --filter "./packages/*" build

      - name: Typecheck
        run: pnpm -r --filter "./packages/*" typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm -r --filter "./packages/*" test

      - name: Bundle budget
        run: pnpm -r --filter "./packages/*" size

      - name: Dependency audit
        run: pnpm audit --audit-level=high

  nuxt4-compat:
    name: Nuxt 4 compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Pin Nuxt 4 across the workspace for this job — peer ranges stay
      # permissive (^3 || ^4) but we force-resolve to 4.x here so the
      # module and playground are actually exercised against v4.
      - name: Force-resolve Nuxt 4
        run: |
          node -e "
          const fs = require('fs');
          const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          p.pnpm = p.pnpm || {};
          p.pnpm.overrides = {
            ...(p.pnpm.overrides || {}),
            nuxt: '^4.4.0',
            '@nuxt/kit': '^4.4.0',
            '@nuxt/schema': '^4.4.0',
          };
          fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
          "

      - name: Install dependencies (Nuxt 4)
        run: pnpm install --no-frozen-lockfile

      # Core + Vue must be built before the Nuxt module can typecheck or
      # build against them (same reason as the main `verify` job).
      - name: Build upstream packages
        run: pnpm -r --filter "./packages/core" --filter "./packages/vue" build

      - name: Module typecheck
        run: pnpm --filter @berkantdev/agentui-nuxt typecheck

      - name: Module tests
        run: pnpm --filter @berkantdev/agentui-nuxt test

      - name: Module build
        run: pnpm --filter @berkantdev/agentui-nuxt build

      - name: Playground build (Nuxt 4)
        run: pnpm --filter @berkantdev/agentui-nuxt-playground build
