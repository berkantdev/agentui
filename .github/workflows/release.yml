name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version & publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Changesets needs write access to open/update the Version Packages PR and tags.
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so changesets can diff against main properly.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r --filter "./packages/*" build

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          # Applies pending changesets, bumps versions, writes CHANGELOG.md,
          # and publishes to npm. With no pending changesets it just opens
          # or refreshes the "Version Packages" PR.
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
